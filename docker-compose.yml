name: "sotoobrador"

networks:
  proxy-net:
    external: true
  obrador-internal-net:
    driver: bridge

volumes:
  obrador_db_data:
    external: true
    # Nombre físico del volumen existente con los datos. NO se renombra (es interno
    # e invisible; renombrarlo exigiría copiar todos los datos sin beneficio real).
    name: cocina_cocina_db_data

services:
  sotoobrador-db:
    image: postgres:15-alpine
    container_name: sotoobrador-db
    restart: unless-stopped
    environment:
      # El rol de BD sigue llamándose cocina_user (renombrar un rol superuser en
      # prod requería crear otro superuser; no se hizo). Solo la base de datos pasó
      # a llamarse "obrador". El usuario real se fija siempre vía .env (DB_USER).
      POSTGRES_DB: ${DB_NAME:-obrador}
      POSTGRES_USER: ${DB_USER:-cocina_user}
      POSTGRES_PASSWORD: ${DB_PASS:-cocina_pass}
    volumes:
      - obrador_db_data:/var/lib/postgresql/data
    networks:
      - obrador-internal-net
    ports:
      - "5440:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-cocina_user} -d ${DB_NAME:-obrador}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  sotoobrador-web:
    image: obrador-web:latest
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sotoobrador-web
    restart: unless-stopped
    environment:
      AUTH_TRUST_HOST: "true"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      AUTH_URL: "${AUTH_URL:-https://obrador.sotodelprior.com}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-https://obrador.sotodelprior.com}"
      DATABASE_URL: postgresql://${DB_USER:-cocina_user}:${DB_PASS:-cocina_pass}@sotoobrador-db:5432/${DB_NAME:-obrador}
      AUTH_SECRET: "${AUTH_SECRET:-supersecretkey123}"
      NEXTAUTH_SKIP_ENV_VALIDATION: "true"
      NEXTAUTH_URL_INTERNAL: "http://localhost:3000"
      NEXTAUTH_TRUST_HOST: "true"
      NODE_ENV: "development"
      # DigitalOcean Spaces (S3-compatible)
      DO_SPACES_REGION: "${DO_SPACES_REGION:-fra1}"
      DO_SPACES_ENDPOINT: "${DO_SPACES_ENDPOINT:-https://fra1.digitaloceanspaces.com}"
      DO_SPACES_BUCKET: "${DO_SPACES_BUCKET:-media-sotodelprior}"
      DO_SPACES_KEY: "${DO_SPACES_KEY:-}"
      DO_SPACES_SECRET: "${DO_SPACES_SECRET:-}"
      DO_SPACES_PUBLIC_URL: "${DO_SPACES_PUBLIC_URL:-https://media-sotodelprior.fra1.cdn.digitaloceanspaces.com}"
      DO_SPACES_APP_PREFIX: "${DO_SPACES_APP_PREFIX:-obrador}"
      # Web Push (VAPID)
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@example.com}"
      # Secreto del cron de generación de tareas (/api/cron/generate-tasks)
      CRON_SECRET: "${CRON_SECRET:-}"
    networks:
      - proxy-net
      - obrador-internal-net
    depends_on:
      sotoobrador-db:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "autoheal=true"
      - "traefik.enable=true"
      - "traefik.http.routers.sotoobrador-web.rule=Host(`obrador.sotodelprior.com`)"
      - "traefik.http.routers.sotoobrador-web.entrypoints=websecure"
      - "traefik.http.routers.sotoobrador-web.tls=true"
      - "traefik.http.routers.sotoobrador-web.tls.certresolver=le"
      - "traefik.http.routers.sotoobrador-web.middlewares=sotoobrador-web-headers"
      - "traefik.http.middlewares.sotoobrador-web-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.sotoobrador-web-headers.headers.customrequestheaders.X-Forwarded-Scheme=https"
      - "traefik.docker.network=proxy-net"
      - "traefik.http.services.sotoobrador-web.loadbalancer.server.port=3000"

    extra_hosts:
      - "obrador.sotodelprior.com:host-gateway"
